syntax = "proto2";

package ostorlab.agent.message.proto.v3.report.ticket;

message Metadata {
  optional string key = 1;
  optional string value = 2;
}

message Message {
  optional string ticket_id = 1;
  optional string title = 2;
  optional string description = 3;
  optional string stack_trace = 4;
  repeated string global_tags = 5;
  repeated Metadata metadata = 6;
}
