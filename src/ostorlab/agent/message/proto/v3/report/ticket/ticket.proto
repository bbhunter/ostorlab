syntax = "proto2";

package ostorlab.agent.message.proto.v3.report.ticket;

message Tag {
  optional string name = 1;
  optional string value = 2;
}

message Message {
  optional string ticket_id = 1;
  required string title = 2;
  optional string description = 3;
  repeated Tag tags = 4;
  optional string assigned_user = 5;
}
